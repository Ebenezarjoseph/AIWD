<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Website using Bootstrap</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Tech Conference 2023</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#event">Event</a></li>
                <li class="nav-item"><a class="nav-link" href="#register">Register</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Container -->
<div class="container my-5">

    <!-- Event Section -->
    <div id="event" class="row mb-5">
        <div class="col-lg-6 col-md-12">
            <h2 class="text-primary">Upcoming Event: Tech Conference 2023</h2>
            <p>Join us for an exciting day of technology talks, workshops, and networking opportunities.</p>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQOdjZ7MrB0zRadWzueF60OusHSd4xm56-tPQ&s"
                 class="img-fluid rounded shadow" alt="Event Banner">
        </div>

        <div class="col-lg-6 col-md-12">
            <h4>Promotional Video</h4>
            <div class="ratio ratio-16x9 mb-3">
                <video controls>
                    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                </video>
            </div>

            <h4>Background Audio</h4>
            <audio controls class="w-100">
                <source src="https://www.w3schools.com/html/horse.ogg" type="audio/ogg">
            </audio>
        </div>
    </div>

    <!-- Registration Section -->
    <div id="register" class="row">
        <div class="col-lg-8 mx-auto">
            <h2 class="text-center text-primary mb-4">Register for the Event</h2>

            <form class="shadow p-4 rounded bg-light">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <div>
                        <input type="radio" name="gender" class="form-check-input"> Male
                        <input type="radio" name="gender" class="form-check-input ms-3"> Female
                        <input type="radio" name="gender" class="form-check-input ms-3"> Other
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Event Category</label>
                    <select class="form-select" required>
                        <option>Select Category</option>
                        <option>Workshop</option>
                        <option>Talk</option>
                        <option>Networking</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Additional Comments</label>
                    <textarea class="form-control" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Upload Resume</label>
                    <input type="file" class="form-control">
                </div>

                <button type="submit" class="btn btn-primary w-100">Register</button>

            </form>
        </div>
    </div>

</div>

<!-- Bootstrap JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
